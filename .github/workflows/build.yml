name: Build

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  server:
    name: Build server (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: phone-copy-paste-server-linux-x86_64
            binary: phone-copy-paste-server/target/release/phone-copy-paste-server
          - name: macOS
            os: macos-latest
            artifact: phone-copy-paste-server-macos-aarch64
            binary: phone-copy-paste-server/target/release/phone-copy-paste-server
          - name: Windows
            os: windows-latest
            artifact: phone-copy-paste-server-windows-x86_64
            binary: phone-copy-paste-server/target/release/phone-copy-paste-server.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libdbus-1-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install gtk4

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-pkgconf

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: phone-copy-paste-server

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: phone-copy-paste-server
        run: cargo build --release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        working-directory: phone-copy-paste-server
        run: |
          export PATH="/ucrt64/bin:$PATH"
          cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  app:
    name: Build Android app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.7"
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: phone-copy-paste-app
        run: flutter pub get

      - name: Build APK
        working-directory: phone-copy-paste-app
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: phone-copy-paste-app-release
          path: phone-copy-paste-app/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [server, app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          mv phone-copy-paste-server-linux-x86_64/phone-copy-paste-server \
             phone-copy-paste-server-linux-x86_64.bin
          chmod +x phone-copy-paste-server-linux-x86_64.bin
          mv phone-copy-paste-server-macos-aarch64/phone-copy-paste-server \
             phone-copy-paste-server-macos-aarch64.bin
          chmod +x phone-copy-paste-server-macos-aarch64.bin
          mv phone-copy-paste-server-windows-x86_64/phone-copy-paste-server.exe \
             phone-copy-paste-server-windows-x86_64.exe
          mv phone-copy-paste-app-release/app-release.apk \
             phone-copy-paste.apk

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/phone-copy-paste-server-linux-x86_64.bin
            artifacts/phone-copy-paste-server-macos-aarch64.bin
            artifacts/phone-copy-paste-server-windows-x86_64.exe
            artifacts/phone-copy-paste.apk
